<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Electronic Medical Records</title>
    
    <!-- Sweet Alert -->
    <link data-require="sweet-alert@*" data-semver="0.4.2" rel="stylesheet" th:href="@{https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.css}" type="text/css">
    <script th:src="@{https://unpkg.com/sweetalert/dist/sweetalert.min.js}"></script>

    <!-- Global stylesheets -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,300,100,500,700,900" rel="stylesheet" type="text/css">
    <link href="global_assets/css/icons/icomoon/styles.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/bootstrap_limitless.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/layout.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/components.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/colors.min.css" rel="stylesheet" type="text/css">
    <!-- /global stylesheets -->

    <!-- Core JS files -->
    <script src="global_assets/js/main/jquery.min.js"></script>
    <script src="global_assets/js/main/bootstrap.bundle.min.js"></script>
    <script src="global_assets/js/plugins/loaders/blockui.min.js"></script>
    <!-- /core JS files -->

    <!-- Theme JS files -->
    <script src="global_assets/js/plugins/forms/styling/uniform.min.js"></script>

    <script src="assets/js/app.js"></script>
    <script src="global_assets/js/demo_pages/login.js"></script>
    <!-- /theme JS files -->

</head>

<body class="bg-slate-800">

    <!-- Page content -->
    <div class="page-content">

        <!-- Main content -->
        <div class="content-wrapper">

            <!-- Content area -->
            <div class="content d-flex justify-content-center align-items-center">

                <!-- Login card -->
                <form id="loginForm" class="login-form" th:action="@{/login}" method="post">
                    <div class="card mb-0">
                        <div class="card-body">
                            <div class="text-center mb-3">
                                <img src="images/emr.png" alt="" width="200" height="106">                                
                            </div>

                            <div class="form-group form-group-feedback form-group-feedback-left">
                                <input type="text" name="username" id="username" class="form-control" placeholder="Username">
                                <div class="form-control-feedback">
                                    <i class="icon-user text-muted"></i>
                                </div>
                            </div>

                            <div class="form-group form-group-feedback form-group-feedback-left">
                                <input type="password" name="password" id="password" class="form-control" placeholder="Password">
                                <div class="form-control-feedback">
                                    <i class="icon-lock2 text-muted"></i>
                                </div>
                            </div>
                            

                            <div class="form-group">
                                <button type="button" id="login" class="btn btn-primary btn-block">Login</button>
                                <a th:href="@{/registration}" class="btn btn-primary btn-block bg-violet-600">Sign Up</a>
                            </div>
                                                        
                        </div>
                        
                        <div class="card-footer">
                        	<div class="text-justify" style="font-size: 12px;">Copyright &copy; 2021, Complete Digital Solutions Inc.</div>	                        
                        </div>
                    </div>
                </form>
                <!-- /login card -->

            </div>
            <!-- /content area -->

        </div>
        <!-- /main content -->

    </div>
    <!-- /page content -->

    <script type="text/javascript" th:inline="javascript">
        function login(){
            
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            
            var errorExist = "N";           
            
            if (username == '') {               
                swal({
                    title: "Please Check!",
                    text: "Username is a required field.",
                    icon: "warning",
                    buttons: false,
                    timer: 2000,
                })
                .then((value) => {
                    $('#username').focus();
                });             
                
                errorExist = "Y";               
                return 1;
            }
            
            if (password == '') {
                swal({
                    title: "Please Check!",
                    text: "Password is a required field.",
                    icon: "warning",
                    buttons: false,
                    timer: 2000,
                })
                .then((value) => {
                    $('#password').focus();
                });             
                
                errorExist = "Y";               
                return 1;
            }
            
            if(errorExist === "N" ){
                $('#loginForm').submit();
                // let contextRoot = /*[[${#httpServletRequest.getContextPath()}]]*/ '';
                /*fetch(contextRoot+'/login', {
                    method: 'POST',
                    body: new FormData(document.getElementById('loginForm')),
                })
                .then(res => res.json())
                .then(data => {
                    console.log(data);
                    alert(data.errorMessage);
                });*/
            }
            
        }
        
        $(document).ready(function () {
            $('#username').focus();
            $('#login').on('click', login);
            
            let loginErr = /*[[${param.error != null}]]*/ false;
            
            if(loginErr){
                swal({
                    title: "Login Failure!",
                    text: "Invalid Username or Password.",
                    icon: "warning",
                    buttons: false,
                    timer: 2500,
                })
                .then((value) => {
                    $('#username').focus();
                }); 
            }
            
            
            $(document).on('keypress',function(e) {
                if(e.which == 13) {
                    login();
                }
            });
        });
    </script>
</body>
</html>
