<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>

    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
    
	<title>Electronic Medical Records</title>


</head>

<body>

	<!-- Main Navbar -->
	<div th:replace="fragments/common::emr-main-navbar"></div>
	<!-- /Main Navbar -->
					
	<!-- Page content -->
	<div class="page-content">	
	
		<!-- Main sidebar -->
		<div th:replace="fragments/common::emr-main-sidebarnav"></div>
		<!-- /Main sidebar -->


		<!-- Main content -->
		<div class="content-wrapper">

			<!-- Page header -->
			<div class="page-header">
				<div class="page-header-content header-elements-md-inline">
					<div class="page-title d-flex">
						<h4><span class="font-weight-semibold">Medical Request</span></h4>
						<a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
					</div>					
				</div>
			</div>
			<!-- /page header -->
			
			
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1" >
				<div class="modal-dialog">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">Medical Request Details</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>
						<form th:action="@{/emrMedicalRequest}" method="post" class="form-horizontal" th:object="${emrMedicalRequest}" id="modalForm">
							<input type="hidden" th:field="*{id}" id="id"/>
							<div class="modal-body">
								<div class="form-group row">
									<div class="col-sm-12">
										<label class="col-form-label">Medical Request Group</label>
										<select id="emrMedicalRequestGroupId" name="emrMedicalRequestGroup.id" class="form-control">
											<option value="0">- Select Medical Request Group -</option>
					                        <option th:each="medicalRequestGroup : ${emrMedicalRequestGroupList}" th:value="${medicalRequestGroup.id}" th:text="${medicalRequestGroup.medicalRequestGroupName}">
					                    </select>
									</div>
								</div>
								<div class="form-group row">
									<div class="col-sm-12">
										<label class="col-form-label">Medical Request Name</label>
										<span class="validationError text-danger" th:if="${#fields.hasErrors('medicalRequestName')}" th:errors="*{medicalRequestName}"></span>
										<input type="text" id="medicalRequestName" th:field="*{medicalRequestName}" placeholder="Medical Request Name" class="form-control">
									</div>
								</div>										
							</div>

							<div class="modal-footer">
								<button type="button" class="btn btn-link" data-dismiss="modal">Close</button>
								<button type="submit" class="btn bg-primary">Submit form</button>
							</div>
						</form>
					</div>
				</div>
			</div>
			<!-- /Vertical form modal -->


			<!-- Content area -->
			<div class="content pt-0">

				<!-- Dashboard content -->
				<div class="row">
					<div class="col-xl-12">
						<!-- Basic datatable -->
						<div class="card">
							<div class="card-header header-elements-inline">
								<h5 class="card-title">Medical Request List</h5>
								<div class="header-elements">
									<div class="list-icons">				                		
				                		<button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#modal_form_vertical" id="addButton">Add Medical Request</button>				                		
				                	</div>
			                	</div>
							</div>							
		
							<table class="table table-bordered table-hover" id="dataTables-medicalRequestList" >
								<thead>
									<tr>
										<th width="30%">Medical Request Group</th>
										<th width="60%">Medical Request Name</th>									
										<th width="10%" class="text-center">Actions</th>
									</tr>
								</thead>
								<tbody>
									<th:block th:each="mr : ${emrMedicalRequestList}">
										<tr>
											<td width="30%" th:text="${mr.emrMedicalRequestGroup.medicalRequestGroupName}">Medical Request Group Name</td>
											<td width="60%" th:text="${mr.medicalRequestName}">Medical Request Name</td>
											<td width="10%" class="text-center">
												<button id="editMedicalRequestButton" type="button" class="showMedicalRequestDetails btn btn-primary" 
													th:data-row-medicalRequestGroupId="${mr.emrMedicalRequestGroup.id}"
													th:data-row-medicalRequestName="${mr.medicalRequestName}"													
													th:data-row-id="${mr.id}"
													data-toggle="modal" data-target="#modal_form_vertical">View Record</button>
											</td>
										</tr>
									</th:block>
								</tbody>
							</table>
						</div>
						<!-- /basic datatable -->					
					</div>
				</div>
				
				
				
				<!-- /dashboard content -->

			</div>
			<!-- /content area -->


			<!-- Footer -->
			<div th:replace="fragments/common::footer"></div>
			<!-- /Footer -->    

		</div>
		<!-- /main content -->

	</div>
	<!-- /page content -->

	<script th:inline="javascript">
	
		$(document).ready(function() {
			$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
			$("#fileMaintenanceNav").addClass("nav-item-expanded nav-item-open");
			$("#medicalRequest2ndNav").addClass("active");
			
			
			
			
			let msgCode = /*[[${uxmessage == null ? '' : uxmessage.code} ]]*/'';
			let msgDesc = /*[[${uxmessage == null ? '' : uxmessage.message}]]*/'';
			
			if(msgCode === 'ERROR'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: "Medical Request successfully saved.",
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}
			
			
			
		});
		
		let emrMedicalRequestList = /*[[${emrMedicalRequestList == null ? '' : emrMedicalRequestList}]]*/'';
		
		$("#modalForm").submit(function(e){
            
            e.preventDefault(e);
            var isErrorExist = "N";
            var emrMedicalRequestGroupId = $('#emrMedicalRequestGroupId').val();
            var medicalRequestNameNew = $('#medicalRequestName').val();
            
            if(emrMedicalRequestGroupId == "0"){
            	isErrorExist = "Y";
            	swal({
					title: "Error!",
					text: "Medical Request Group is mandatory.",
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
            }
            
            if(medicalRequestNameNew == "" && isErrorExist == 'N'){
            	isErrorExist = "Y";
            	swal({
					title: "Error!",
					text: "Medical Request Name is mandatory.",
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
            }
            
            if(isErrorExist === "N"){            
				jQuery.each(emrMedicalRequestList, function(i, item) {	
	            	
	            	if(item.medicalRequestName.toUpperCase() === medicalRequestNameNew.toUpperCase()){
	            		isErrorExist = "Y";    
	            		swal({
	    					title: "Error!",
	    					text: "Duplicate Medical Request Name",
	    					icon: "error",
	    					buttons: false,
	    		            timer: 2000,
	    				});
	            		return false;
	            	}				
	                				
				});
            }
                        
            if(isErrorExist === "N"){
            	modalForm.submit();            	
            }
            
        });
		
		
		$(document).on("click", ".showMedicalRequestDetails", function() {

			var id = $(this).attr('data-row-id');
			var medicalRequestName = $(this).attr('data-row-medicalRequestName');
			var medicalRequestGroupId = $(this).attr('data-row-medicalRequestGroupId');
			//var medicalRequestGroupId = medicalRequestGroup.id;
			
			$("#modal_form_vertical").find("#id").val(id);
			$("#modal_form_vertical").find("#medicalRequestName").val(medicalRequestName);
			$("#emrMedicalRequestGroupId").val(medicalRequestGroupId);
			
		});
		
		$('#addButton').click((e) => {
        	//clear values in form
        	$('#id').val(0);
        	console.log("ID Value: " + $('#id').val());
        	$('#emrMedicalRequestGroupId').val(0);
        	$('#medicalRequestName').val('');
        });
	</script>
</body>
</html>
