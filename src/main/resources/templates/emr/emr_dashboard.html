				<div class="page-header-content header-elements-md-inline">

									<i class="icon-stack3 icon-3x opacity-75"></i>
								</div>

								<div class="media-body text-right">
									<h3 class="mb-0" th:text="${emrDashboardDto.totalServed}">28</h3>
									<span class="text-uppercase font-size-xs">Total Served Today</span>
								</div>
							</div>
						</div>
					</div>
					
					<div class="col-sm-6 col-xl-3">

								</div>

								<div class="media-body text-right">
									<h3 class="mb-0" th:text="${emrDashboardDto.totalOnqueue}">28</h3>

								</div>
							</div>
						</div>
					</div>

					<div class="col-sm-6 col-xl-3">
						<div class="card card-body bg-danger-400 has-bg-image">
							<div class="media">
								<div class="mr-3 align-self-center">
									<i class="icon-blocked icon-3x opacity-75"></i>
								</div>

								<div class="media-body text-right">
									<h3 class="mb-0" th:text="${emrDashboardDto.totalCancelled}">12</h3>
									<span class="text-uppercase font-size-xs">Total Cancelled Today</span>
								</div>
							</div>
						</div>
					</div>
					
					<div class="col-sm-6 col-xl-3">
						<div class="card card-body bg-orange-400 has-bg-image">
							<div class="media">
								<div class="mr-3 align-self-center">
									<i class="icon-calendar icon-3x opacity-75"></i>
								</div>

								<div class="media-body text-right">
									<h3 class="mb-0" th:text="${#dates.format(emrDashboardDto.today, 'MMM d, yyyy')}">Sept 9, 2020</h3>
									<span class="text-uppercase font-size-xs">Today's Date</span>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="row">
					<div class="col-xl-12">
						<!-- Consultation List -->
						<div class="card">
							<div class="card-header header-elements-inline">
								<h5 class="card-title">Consultation Appointment List</h5>
								<div class="header-elements">
									<div class="list-icons">
										<div class="list-icons-item">
											<div class="form-group form-group-feedback form-group-feedback-right">
													<input type="text" class="form-control" id="mobile" placeholder="Search">
													<div class="form-control-feedback">
														<i class="icon-search4 text-muted" id="mobileIcon"></i>
													</div>
											</div>
										</div>
										
									</div>
								</div>
							</div>

							<form id="cancelConsultationForm" th:action="@{/cancelEmrConsulation}" method="post">
								<input id="consultationId" name="consultationId" type="hidden"/>
							</form>
								<table class="table datatable-basic">
									<thead>
										<tr>
											<th class="text-center">Patient Name</th>
											<th class="text-center">Status</th>
											<th colspan="2" class="text-center">Action</th>
											<th class="text-center">Complaints</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="ec : *{emrConsultations}">
											<td class="text-center" th:text="${ec.patient.fullName}">
												James Cruz
											</td>
											<td class="text-center" th:text="${ec.consultationStatus}">
												ON QUEUE
											</td>
											<td colspan="2" class="text-center">
												<span>
													<a th:href="|@{/emrpatientrecord}/${ec.patient.id}/${ec.id}|" class="btn btn-primary">View</a>
												</span>
												<span>
													<button class="btn btn-danger" th:classappend="${ec.consultationStatus == 'CANCELLED'} ? disabled : cancelConsultation"
													th:data-row-id="${ec.id}"
													>Cancel</button>
												</span>
											</td>

											<td class="text-center" th:text="${ec.symptoms}">
												3/5
											</td>
										</tr>
									</tbody>
								</table>
						</div>
						<!-- /Consultation List -->
					</div>

			</div>

	<script th:inline="javascript">		
	
	    $(document).ready(function() {
	    		    				
			$(".nav-link").removeClass("active");	    	  	
			$("#emrDashboardNav").addClass("active");

	    	let msgCode = /*[[${uxmessage == null ? '' : uxmessage.code} ]]*/'';
			let msgDesc = /*[[${uxmessage == null ? '' : uxmessage.message}]]*/'';

	    	if(msgCode === 'ERROR'){
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}

	    });

		$(document).on("click", ".cancelConsultation", function(){

			swal({
			  title: "Confirmation?",
			  text: "Are you sure you want to cancel the appointment?",
			  icon: "info",
			  buttons: ["Yes", "No"],
			  dangerMode: false,
			})
			.then((willDelete) => {
			  if (willDelete) {
				  //No Response
				  console.log("will delete no");

			  } else {
			  	 console.log("will delete yes");
				 var id = $(this).attr('data-row-id');
				 $("#cancelConsultationForm").find("#consultationId").val(id);
				 $("#cancelConsultationForm").submit();
			  }
			});

		});

	</script>
