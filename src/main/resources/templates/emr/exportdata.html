	<script th:inline="javascript"> 
    
    const objectToCsv = function(data) {        
        const csvRows = [];
        //get the headers
        const headers = Object.keys(data[0]);
        csvRows.push(headers.join(','));
        //loop over the rows
        for(var row of data){
          const values = headers.map(header => {
            const escaped = (''+row[header]).replace(/"/g, '\\"');
            console.log('row header: ' + escaped);
            return `"${row[header]}"`;
            //return row[header];
          });
          csvRows.push(values.join(','));
        }
        return csvRows.join('\n');
    };
      
    const download = function(data, fileName) {
        const blob = new Blob([data], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', fileName);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
      
    const exportPatientMasterListFunc = async function() {
        let url = /*[[@{/exportdata/patients}]]*/'';
        let res = await fetch(url);
        let json = await res.json();
        console.log(json)
        const data = json.map( row => ({
            //id: row.id,
            lastName: row.lastName.trim(),
            firstName: row.firstName,            
            gender: row.gender != null ? row.gender : "",
            birthdate: row.birthdate,
            street: row.street != null ? row.street : "",
            city: row.city != null ? row.city : "",
            province: row.province != null ? getProvinceName(row.province) : "",
            contactNumber: row.contactNumber != null ? row.contactNumber : "",
            emailAddress: row.email != null ? row.email : "",
            emergencyContactName: row.emergencyContactName != null ? row.emergencyContactName : "",
            emergencyContactAddress: row.emergencyContactAddress != null ? row.emergencyContactAddress : "",
            emergencyContactNumber: row.emergencyContactNumber != null ? row.emergencyContactNumber : "",
            maritalStatus: row.maritalStatus != null ? row.maritalStatus : "",
            profession: row.profession != null ? row.profession : "",
            seniorCitizenNumber: row.seniorCitizenNumber != null ? row.seniorCitizenNumber : "",
            notes: row.notes != null ? row.notes : "",
            patientPhoto: row.patientPhoto != null ? row.patientPhoto : "",
            mothersname: row.mothersname != null ? row.mothersname : "",
            mothersoccupation: row.mothersoccupation != null ? row.mothersoccupation : "",
            mothersmobile: row.mothersmobile != null ? row.mothersmobile : "",
            fathersname: row.fathersname != null ? row.fathersname : "",
            fathersoccupation: row.fathersoccupation != null ? row.fathersoccupation : "",
            fathersmobile: row.fathersmobile != null ? row.fathersmobile : "",
        }));
        console.log(data);
        if (data.length != 0) {
          const csvData = objectToCsv(data);
          download(csvData, 'patientList.csv');
        } else {
            swal({
                title: "Data Unavailable!",
                text: "There is no available data to be exported",
                icon: "warning",
                buttons: false,
                timer: 2500,
            })
        }
    };
