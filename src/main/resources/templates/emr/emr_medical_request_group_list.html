<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>

    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
    
	<title>Electronic Medical Records</title>


</head>

<body>

	<!-- Main Navbar -->
	<div th:replace="fragments/common::emr-main-navbar"></div>
	<!-- /Main Navbar -->
					
	<!-- Page content -->
	<div class="page-content">	
	
		<!-- Main sidebar -->
		<div th:replace="fragments/common::emr-main-sidebarnav"></div>
		<!-- /Main sidebar -->


		<!-- Main content -->
		<div class="content-wrapper">

			<!-- Page header -->
			<div class="page-header">
				<div class="page-header-content header-elements-md-inline">
					<div class="page-title d-flex">
						<h4><span class="font-weight-semibold">Medical Request Group</span></h4>
						<a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
					</div>					
				</div>
			</div>
			<!-- /page header -->
			
			
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1" >
				<div class="modal-dialog">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">Medical Request Group Details</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>
						<form th:action="@{/emrMedicalRequestGroup}" method="post" class="form-horizontal" th:object="${emrMedicalRequestGroup}" id="modalForm">
							<input type="hidden" th:field="*{id}" id="id"/>
							<div class="modal-body">
								<div class="form-group row">
									<div class="col-sm-12">
										<label class="col-form-label">Medical Request Group Name</label>
										<span class="validationError text-danger" th:if="${#fields.hasErrors('medicalRequestGroupName')}" th:errors="*{medicalRequestGroupName}"></span>
										<input type="text" id="medicalRequestGroupName" th:field="*{medicalRequestGroupName}" placeholder="Medical Request Group Name" class="form-control">
									</div>
								</div>										
							</div>

							<div class="modal-footer">
								<button type="button" class="btn btn-link" data-dismiss="modal">Close</button>
								<button type="submit" class="btn bg-primary">Submit form</button>
							</div>
						</form>
					</div>
				</div>
			</div>
			<!-- /Vertical form modal -->


			<!-- Content area -->
			<div class="content pt-0">

				<!-- Dashboard content -->
				<div class="row">
					<div class="col-xl-12">
						<!-- Basic datatable -->
						<div class="card">
							<div class="card-header header-elements-inline">
								<h5 class="card-title">Medical Request Group List</h5>
								<div class="header-elements">
									<div class="list-icons">				                		
				                		<button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Medical Request Group</button>				                		
				                	</div>
			                	</div>
							</div>							
		
							<table class="table datatable-basic" id="dataTables-medicalList" >
								<thead>
									<tr>
										<th>Medical Request Group Name</th>									
										<th class="text-center">Actions</th>
									</tr>
								</thead>
								<tbody>
									<th:block th:each="mr : ${emrMedicalRequestGroupList}">
										<tr>
											<td th:text="${mr.medicalRequestGroupName}">Medical Request Group Name</td>
											<td class="text-center" width="180px;">
												<button id="editMedicalRequestGroupButton" type="button" class="showMedicalRequestGroupDetails btn btn-primary" 
													th:data-row-medicalRequestGroupName="${mr.medicalRequestGroupName}"													
													th:data-row-id="${mr.id}"
													data-toggle="modal" data-target="#modal_form_vertical">View Record</button>
											</td>
										</tr>
									</th:block>
								</tbody>
							</table>
						</div>
						<!-- /basic datatable -->					
					</div>
				</div>
				
				
				
				<!-- /dashboard content -->

			</div>
			<!-- /content area -->


			<!-- Footer -->
			<div th:replace="fragments/common::footer"></div>
			<!-- /Footer -->    

		</div>
		<!-- /main content -->

	</div>
	<!-- /page content -->

	<script th:inline="javascript">
	
		$(document).ready(function() {
			$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
			$("#fileMaintenanceNav").addClass("nav-item-expanded nav-item-open");
			$("#medicalRequestGroup2ndNav").addClass("active");
			
			
			let msgCode = /*[[${uxmessage == null ? '' : uxmessage.code} ]]*/'';
			let msgDesc = /*[[${uxmessage == null ? '' : uxmessage.message}]]*/'';
			
			if(msgCode === 'ERROR'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'ERRORDUPLICATE'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});			
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: "Medical Request Group successfully saved.",
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}
			
			
			
		});
		
		let emrMedicalRequestGroupList = /*[[${emrMedicalRequestGroupList == null ? '' : emrMedicalRequestGroupList}]]*/'';
		
		$("#modalForm").submit(function(e){
            
            e.preventDefault(e);
            var isErrorExist = "N";
            var medicalRequestGroupNameNew = $('#medicalRequestGroupName').val();
                       
            
            if(medicalRequestGroupNameNew == ""){
            	isErrorExist = "Y";
            	swal({
					title: "Error!",
					text: "Medical Request Group Name is mandatory.",
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
            }
            
            jQuery.each(emrMedicalRequestGroupList, function(i, item) {	
            	
            	if(item.medicalRequestGroupName.toUpperCase() === medicalRequestGroupNameNew.toUpperCase()){
            		isErrorExist = "Y";    
            		swal({
    					title: "Error!",
    					text: "Duplicate Medical Request Group Name",
    					icon: "error",
    					buttons: false,
    		            timer: 2000,
    				});
            		return false;
            	}				
                				
			});
                        
            if(isErrorExist === "N"){
            	//alert('No Error.')
            	modalForm.submit();            	
            }
            
        });
		
		
		
		$(document).on("click", ".showMedicalRequestGroupDetails", function() {

			var id = $(this).attr('data-row-id');
			var medicalRequestGroupName = $(this).attr('data-row-medicalRequestGroupName');
			
			$("#modal_form_vertical").find("#id").val(id);
			$("#modal_form_vertical").find("#medicalRequestGroupName").val(medicalRequestGroupName);
		});
	</script>
</body>
</html>
