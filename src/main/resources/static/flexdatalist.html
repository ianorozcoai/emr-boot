<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" th:href="@{/js/jquery.flexdatalist.min.css}" href="js/jquery.flexdatalist.min.css">

</head>

<body>

<!-- Page content -->
<div class="page-content">

  <!-- Main content -->
  <div class="content-wrapper">

    <!-- Content area -->
    <div class="content">

      <!-- Inner container -->
      <div class="d-md-flex align-items-md-start">

        <!-- Right content -->
        <div class="tab-content w-100">
          <div class="tab-pane fade active show" id="profile">

            <!-- Consultation Table -->
            <div class="row">
              <div class="col-xl-12">
                <!-- Basic datatable -->
                <div class="card">
                  <div class="card-header header-elements-inline">
                    
                  </div>

                  <div class="card-body">
                    <div class="form-group">
                      <div class="row">
                        <div class="col-sm-12">
                          <label for="diagnosis">Diagnosis</label>
                          <input type="text" class="form-control flexdatalist" id="diagnosisJSON" name="diagnosisJSON" placeholder="Diagnosis"
                               data-data="icd/datalist"
                               data-search-in="description"
                               data-search-by-word="true"
                               data-min-length="1"
                               multiple="multiple"
                               data-selection-required="true"
                               data-visible-properties='["code","description"]'
                               data-text-property="{code} - {description}"
                               data-value-property='["id","code","description"]'>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- /basic datatable -->
              </div>
            </div>
            <!-- /Consultation Table -->

          </div>
        </div>
        <!-- /right content -->

      </div>
      <!-- /inner container -->


    </div>
    <!-- /content area -->

  </div>
  <!-- /main content -->

</div>
<!-- /page content -->
